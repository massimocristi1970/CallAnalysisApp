name: Deploy To Hugging Face

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: huggingface-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync call-analysis-app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Hugging Face token
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "HF_TOKEN GitHub secret is not set."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade huggingface_hub

      - name: Build snapshot for Hugging Face
        run: |
          rm -rf hf-deploy
          mkdir hf-deploy
          git archive --format=tar HEAD | tar -xf - -C hf-deploy
          rm -f hf-deploy/call_analysis.db
          rm -f hf-deploy/CallAnalysisApp.zip

      - name: Upload snapshot to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          REPO_ID: massimocristi1970/call-analysis-app
        run: |
          python -c "from huggingface_hub import HfApi; import os; HfApi(token=os.environ['HF_TOKEN']).upload_folder(repo_id=os.environ['REPO_ID'], repo_type='space', folder_path='hf-deploy', path_in_repo='.', commit_message='Deploy snapshot from GitHub Actions', ignore_patterns=['call_analysis.db','CallAnalysisApp.zip'], delete_patterns=['call_analysis.db','CallAnalysisApp.zip'])"
